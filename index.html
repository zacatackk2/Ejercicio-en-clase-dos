<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>titulo de pestaña</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <p class="etiqueta">cesar :)</p>
      <h1>test</h1>
      <p class="bajada">holahola</p>
    </header>

    <main>
      <section class="panel-resumen" aria-label="Resumen de datos">
        <article>
          <span id="total-registros">0</span>
          <p>registros</p>
        </article>
        <article>
          <span id="valor-total">0</span>
          <p>valor total</p>
        </article>
        <article>
          <span id="categoria-mayor">-</span>
          <p>categoría mayor</p>
        </article>
      </section>

      <section class="contenedor-viz">
        <div>
          <p class="etiqueta">Visualización</p>
          <h2>Valores por categoría</h2>
          <p>
            Cambia los datos en <code>datos.csv</code> para adaptar esta plantilla a tu investigación.
            Cada fila debe tener una categoría, un valor y una nota.
          </p>
        </div>
        <div id="grafica" class="grafica" aria-live="polite"></div>
      </section>

      <section>
        <p class="etiqueta">Lectura generada</p>
        <p id="lectura" class="lectura">Cargando datos...</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
